# ─────────────────────────────────────────────────────────────────
# Server — port 9090 to avoid conflict with Node.js backend (5000)
# ─────────────────────────────────────────────────────────────────
server.port=9090
spring.application.name=od-system

# ─────────────────────────────────────────────────────────────────
# H2 In-Memory Database (active by default for demo/development)
# ─────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:oddb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console: http://localhost:9090/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ─────────────────────────────────────────────────────────────────
# PostgreSQL (uncomment to switch to real DB)
# ─────────────────────────────────────────────────────────────────
# spring.datasource.url=jdbc:postgresql://localhost:5432/od_permission_system
# spring.datasource.driver-class-name=org.postgresql.Driver
# spring.datasource.username=postgres
# spring.datasource.password=your_password
# spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# spring.jpa.hibernate.ddl-auto=update

# ─────────────────────────────────────────────────────────────────
# JWT
# ─────────────────────────────────────────────────────────────────
jwt.secret=your_jwt_secret_key_here_change_in_production_must_be_32_chars
jwt.expiration=2592000000

# ─────────────────────────────────────────────────────────────────
# File Upload
# ─────────────────────────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=20MB

# Static resource serving for uploaded files
spring.web.resources.static-locations=file:uploads/,classpath:/static/

# ─────────────────────────────────────────────────────────────────
# Logging
# ─────────────────────────────────────────────────────────────────
logging.level.com.example.odsystem=DEBUG
logging.level.org.springframework.security=INFO
